[build]
  # Force Netlify to build from repo root even if the UI still has Base directory = app/public.
  base = "."
  command = "npm --prefix app install"
  publish = "app/public"
  functions = "app/netlify/functions"

[functions]
  external_node_modules = ["youtube-dl-exec"]
  included_files = ["app/package.json"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
